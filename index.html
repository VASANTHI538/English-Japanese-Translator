<!DOCTYPE html>
<html>
<head>
    <title>English to Japanese Translator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background: #f0f0f0;
        }
        h2 { color: #333; }
        input, button {
            padding: 10px;
            font-size: 16px;
            margin: 5px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-size: 24px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>English to Japanese Translator</h2>
    <input type="text" id="text" placeholder="Type English word...">
    <button onclick="translateWord()">Translate</button>
    <div id="result"></div>

    <script>
        function translateWord() {
            let word = document.getElementById("text").value.toLowerCase().trim();
            let result = document.getElementById("result");
            
            let dictionary = {
                Hello 
              thank you 
               sorry 
                good morning 
               good night 
               good afternoon 
               yes 
            };
            
            if (dictionary[word]) {
                result.innerText = dictionary[word];
            } else if (word === "") {
                result.innerText = "Please type something";
            } else {
                result.innerText = "Translation not found";
            }
        }
    </script>
</body>
</html>
